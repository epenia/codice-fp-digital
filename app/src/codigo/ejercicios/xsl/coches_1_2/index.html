<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Auditoría de Eficiencia Energética</title>
    <style>body { font-family: Arial, sans-serif; margin: 2rem; }
h1 { color: #2e7d32; border-bottom: 2px solid #2e7d32; padding-bottom: 0.5rem; }
table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
th, td { border: 1px solid #ccc; padding: 0.75rem; text-align: left; }
th { background-color: #2e7d32; color: white; }
tr:nth-child(even) { background-color: #e8f5e9; }
.total-potencia { margin-top: 1rem; font-size: 1.1rem; color: #2e7d32; }</style>
</head>
<body>
    <h1>Vehículos Eficientes (Consumo &lt; 8.0 l/100km)</h1>
    <table>
        <thead>
            <tr>
                <th>Modelo</th>
                <th>Motor</th>
                <th>Consumo (ciudad)</th>
                <th>Potencia</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Mercedes-Benz C-Class</td>
                <td>Gasolina</td>
                <td>6.0 l/100km</td>
                <td>204 CV</td>
            </tr>
            <tr>
                <td>Porsche 911 Carrera</td>
                <td>Gasolina/Híbrido &#9889;</td>
                <td>7.5 l/100km</td>
                <td>450 CV</td>
            </tr>
            <tr>
                <td>Toyota Corolla</td>
                <td>Gasolina</td>
                <td>5.5 l/100km</td>
                <td>139 CV</td>
            </tr>
        </tbody>
    </table>
    <p class="total-potencia">Total de potencia: <strong>793 CV</strong></p>
</body>
</html>
