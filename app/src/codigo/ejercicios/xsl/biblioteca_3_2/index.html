<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Metadatos y Cronología</title>
    <style>body { font-family: Arial, sans-serif; margin: 2rem; }
h1 { color: #01579b; border-bottom: 2px solid #01579b; padding-bottom: 0.5rem; }
table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
th, td { border: 1px solid #ccc; padding: 0.75rem; text-align: left; }
th { background-color: #01579b; color: white; }
tr:nth-child(even) { background-color: #e1f5fe; }
p { margin-top: 1rem; font-size: 1.1rem; }</style>
</head>
<body>
    <h1>Metadatos y Cronología Literaria</h1>
    <table>
        <thead>
            <tr>
                <th>Libro</th>
                <th>Autor</th>
                <th>Año nacimiento</th>
                <th>Pausas recomendadas</th>
                <th>Tirada estimada</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Cien años de soledad</td>
                <td>Gabriel García Márquez</td>
                <td>1927</td>
                <td>&#9208;</td>
                <td>10000</td>
            </tr>
            <tr>
                <td>El extranjero</td>
                <td>Albert Camus</td>
                <td>1913</td>
                <td></td>
                <td>5000</td>
            </tr>
            <tr>
                <td>El amor en los tiempos del cólera</td>
                <td>Gabriel García Márquez</td>
                <td>1927</td>
                <td>&#9208;</td>
                <td>15000</td>
            </tr>
        </tbody>
    </table>
    <p><strong>Total tirada estimada:</strong> 30000</p>
</body>
</html>
