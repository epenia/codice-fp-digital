<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Catálogo de Autores en Español</title>
    <style>body { font-family: Arial, sans-serif; margin: 2rem; }
h1 { color: #e65100; border-bottom: 2px solid #e65100; padding-bottom: 0.5rem; }
.libro { border: 1px solid #ddd; border-radius: 8px; padding: 1rem; margin: 1rem 0; background: #fff8e1; }
.libro h2 { margin-top: 0; color: #e65100; }
.libro.destacado { border-color: #e65100; border-width: 2px; background: #fff3e0; box-shadow: 0 2px 8px rgba(230,81,0,0.15); }
.libro p { margin: 0.3rem 0; }</style>
</head>
<body>
    <h1>Catálogo de Libros en Español</h1>
    <p>Total de libros en español: 2</p>
    <div class="libro">
        <h2>Cien años de soledad</h2>
        <p><strong>Autor:</strong> GABRIEL GARCÍA MÁRQUEZ</p>
        <p><strong>Año:</strong> 1967</p>
        <p><strong>Géneros secundarios:</strong> 3</p>
    </div>
    <div class="libro destacado">
        <h2>El amor en los tiempos del cólera</h2>
        <p><strong>Autor:</strong> GABRIEL GARCÍA MÁRQUEZ</p>
        <p><strong>Año:</strong> 1985</p>
        <p><strong>Géneros secundarios:</strong> 3</p>
    </div>
</body>
</html>
