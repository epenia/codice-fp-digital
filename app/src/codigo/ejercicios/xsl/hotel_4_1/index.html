<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reporte de Facturación</title>
    <style>body { font-family: Arial, sans-serif; margin: 2rem; }
h1 { color: #004d40; border-bottom: 2px solid #004d40; padding-bottom: 0.5rem; }
table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
th, td { border: 1px solid #ccc; padding: 0.75rem; text-align: left; }
th { background-color: #004d40; color: white; }
tr:nth-child(even) { background-color: #e0f2f1; }
td:nth-child(4), td:nth-child(5), td:nth-child(6) { text-align: right; }</style>
</head>
<body>
    <h1>Reporte de Facturación - Reservas Pagadas</h1>
    <table>
        <thead>
            <tr>
                <th>Cliente</th>
                <th>Hotel</th>
                <th>Habitación</th>
                <th>Subtotal</th>
                <th>Extras</th>
                <th>Coste total</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Andrea López</td>
                <td>Gran Palacio del Centro</td>
                <td>Junior Suite</td>
                <td>€1350.00</td>
                <td>€65.00</td>
                <td>€1370.25</td>
            </tr>
            <tr>
                <td>Familia Martínez</td>
                <td>Retiro Urbano Boutique</td>
                <td>Familiar Conexión</td>
                <td>€960.00</td>
                <td>€60.00</td>
                <td>€1015.00</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
